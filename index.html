<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حلوين عشيرة</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: linear-gradient(135deg, #f6d365, #fda085); min-height: 100vh; padding: 20px; }
        #image-container { margin: 20px auto; width: 100%; max-width: 400px; background: white; padding: 10px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        img { width: 100%; height: auto; border-radius: 15px; transition: opacity 0.5s; }
        button { padding: 15px 40px; font-size: 20px; cursor: pointer; background: #333; color: white; border: none; border-radius: 50px; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>حلوين عشيرة</h1>
    <p>اضغط على الزر لرؤية أجمل ما خلق الله</p>
    
    <div id="image-container">
        <img id="random-img" src="1.png" alt="صورة">
    </div>

    <button onclick="changeImage()">شاهد الجمال</button>

    <script>
        function changeImage() {
            const img = document.getElementById('random-img');
            // اختيار رقم من 1 إلى 10
            const randomNum = Math.floor(Math.random() * 10) + 1;
            // تحميل الصورة بناءً على الاسم المباشر
            img.style.opacity = 0;
            setTimeout(() => {
                img.src = randomNum + ".png";
                img.style.opacity = 1;
            }, 300);
        }
    </script>
</body>
</html>
