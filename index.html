<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Bernabéu Pulse</title>
    <style>
        :root { --gold: #cca43b; --blue: #111827; }
        body { font-family: 'Segoe UI', sans-serif; background: #f9f9f9; margin: 0; transition: 0.3s; }
        header { background: var(--blue); color: var(--gold); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--gold); }
        .sidebar { position: fixed; right: -300px; top: 0; width: 300px; height: 100%; background: var(--blue); transition: 0.3s; padding-top: 60px; z-index: 1000; }
        .sidebar.active { right: 0; }
        .sidebar a { display: block; color: white; padding: 20px; text-decoration: none; border-bottom: 1px solid #222; }
        .news-item { background: white; margin: 15px auto; max-width: 800px; padding: 20px; border-radius: 10px; border-right: 5px solid var(--gold); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .lang-btn { background: var(--gold); color: white; border: none; padding: 5px 15px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <div style="font-size:22px; font-weight:bold;">Bernabéu Pulse</div>
    <div style="display:flex; gap:10px; align-items:center;">
        <button class="lang-btn" onclick="toggleLang()">EN / AR</button>
        <div onclick="document.querySelector('.sidebar').classList.toggle('active')" style="cursor:pointer; font-size:25px;">☰</div>
    </div>
</header>

<div class="sidebar">
    <a href="#" class="i18n" data-ar="🏠 الرئيسية" data-en="🏠 Home">🏠 الرئيسية</a>
    <a href="#" class="i18n" data-ar="📰 آخر الأخبار" data-en="📰 Latest News">📰 آخر الأخبار</a>
    <a href="#" class="i18n" data-ar="👥 اللاعبين والأساطير" data-en="👥 Players & Legends">👥 اللاعبين والأساطير</a>
</div>

<h1 style="text-align:center;" class="i18n" data-ar="الأخبار والانتقالات الملكية" data-en="Real Madrid News & Transfers">الأخبار والانتقالات الملكية</h1>
<div id="news-feed"></div>

<script>
    // نظام الترجمة
    function toggleLang() {
        const html = document.documentElement;
        const currentLang = html.lang === 'ar' ? 'en' : 'ar';
        html.lang = currentLang;
        html.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        
        document.querySelectorAll('.i18n').forEach(el => {
            el.innerText = el.getAttribute('data-' + currentLang);
        });
    }

    // جلب الأخبار
    const rssUrl = "https://api.rss2json.com/v1/api.json?rss_url=https://www.365scores.com/ar/football/team/real-madrid-131/news/feed";

    fetch(rssUrl)
        .then(res => res.json())
        .then(data => {
            const feed = document.getElementById('news-feed');
            data.items.slice(0, 5).forEach(item => {
                feed.innerHTML += `
                    <div class="news-item">
                        <h3>${item.title}</h3>
                        <p>${item.description}</p>
                        <a href="${item.link}" target="_blank" style="color:var(--gold);">Read More / اقرأ المزيد</a>
                    </div>
                `;
            });
        });
</script>
</body>
</html>
