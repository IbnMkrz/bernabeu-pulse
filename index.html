<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>يوميات غنومي | ملك الحارة</title>
    <style>
        body { background: #000; color: #cca43b; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .hero-img { width: 250px; border: 5px solid #cca43b; border-radius: 50%; margin-bottom: 20px; }
        h1 { font-size: 3em; margin-bottom: 10px; }
        .quote { font-style: italic; color: #fff; margin-bottom: 30px; }
        .btn { background: #cca43b; color: #000; border: none; padding: 15px 30px; font-size: 1.2em; border-radius: 50px; cursor: pointer; font-weight: bold; }
        #result { margin-top: 30px; }
    </style>
</head>
<body>

    <img src="image.png" class="hero-img" alt="غنام ملك الحارة">
    <h1>أنا غنام.. ملك الحارة</h1>
    <p class="quote">"الذهب لا يصدأ، وغنام لا يطيح.. إلا إذا قررت الأرض تسلم عليّ!"</p>

    <div id="content">
        <button class="btn" onclick="document.getElementById('result').innerHTML='<img src=image_2.png style=width:250px; border-radius:20px;><h3>طلعت صورة الملك!</h3>'">اضغط هنا لتشوف وجهك الحقيقي</button>
        <div id="result"></div>
    </div>

</body>
</html>
