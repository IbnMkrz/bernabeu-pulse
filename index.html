<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Bernabéu Pulse | مركز الوسائط</title>
    <style>
        :root { --gold: #cca43b; --blue: #111827; }
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; }
        header { background: var(--blue); color: var(--gold); padding: 15px; text-align: center; border-bottom: 3px solid var(--gold); }
        .media-container { max-width: 600px; margin: 20px auto; padding: 20px; }
        .tweet-card { background: white; margin-bottom: 20px; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
</head>
<body>

<header>
    <h1>مركز وسائط نبض البرنابيو</h1>
</header>

<div class="media-container" id="media-feed">
    <div class="tweet-card">
        <blockquote class="twitter-tweet">
            <p lang="ar" dir="rtl">
                <a href="https://twitter.com/RealMadrid/status/1800000000000000000"></a>
            </p>
        </blockquote>
    </div>
</div>

<script>
    // لتحديث الموقع تلقائياً، يمكنك إضافة روابط التغريدات في هذه المصفوفة
    const tweetLinks = [
        "https://twitter.com/RealMadrid/status/1798765432109876543", 
        "https://twitter.com/RealMadrid/status/1798765432109876544"
    ];

    function loadTweets() {
        const container = document.getElementById('media-feed');
        container.innerHTML = ''; // تفريغ
        tweetLinks.forEach(link => {
            container.innerHTML += `
                <div class="tweet-card">
                    <blockquote class="twitter-tweet">
                        <a href="${link}"></a>
                    </blockquote>
                </div>
            `;
        });
        // إعادة تحميل مكتبة تويتر لتفعيل التغريدات
        if (window.twttr) window.twttr.widgets.load();
    }
    
    // تحميل التغريدات عند فتح الصفحة
    loadTweets();
</script>
</body>
</html>
