<!-- صفحة اللعبة المحدثة -->
<div id="game" class="page">
    <h2>لعبة "صور وجهك"</h2>
    <p>اضغط الزر وشوف وجهك الحقيقي!</p>
    <button class="btn" onclick="takePhoto()">صورني</button>
    <div id="result" style="margin-top:20px;"></div>
</div>

<script>
    function takePhoto() {
        // سيقوم الكود الآن بعرض صورتك المخصصة (image_2.png)
        document.getElementById('result').innerHTML = `
            <h3>طلعت صورتك!</h3>
            <img src="image_2.png" style="width:250px; border-radius:15px; border: 3px solid var(--gold);">
            <p style="margin-top:10px; font-weight:bold; color:var(--gold);">هههههه! طالع نسخة طبق الأصل!</p>
        `;
    }
</script>
