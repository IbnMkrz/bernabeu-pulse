<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نبض مدريد - المنصة الملكية</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f0f0; margin: 0; }
        header { background: #00529f; color: #fecb00; padding: 20px; text-align: center; font-weight: bold; }
        .match-box { background: #fff; margin: 20px; padding: 20px; border-radius: 15px; border-right: 5px solid #00529f; }
        .analysis { font-style: italic; color: #333; margin-top: 15px; border-top: 1px solid #ccc; padding-top: 10px; }
        .sidebar { height: 100%; width: 0; position: fixed; top: 0; right: 0; background: #003366; transition: 0.5s; padding-top: 60px; z-index: 10; }
        .sidebar a { padding: 15px; display: block; color: white; text-decoration: none; }
        .page { display: none; padding: 20px; }
        .active { display: block; }
    </style>
</head>
<body>

<header onclick="toggleNav()">☰ القائمة الملكية</header>

<div id="mySidebar" class="sidebar">
    <a href="#" onclick="showPage('home')">الرئيسية</a>
    <a href="#" onclick="showPage('analysis')">تحليل وفلسفة</a>
</div>

<div id="home" class="page active">
    <div id="match-content" class="match-box"></div>
</div>

<div id="analysis" class="page">
    <h2>فلسفة الملكي</h2>
    <p>ريال مدريد ليس مجرد نادٍ، إنه عقيدة كروية تؤمن بأن المستحيل مجرد كلمة في قاموس الضعفاء.</p>
</div>

<script>
    // قاعدة بيانات المباراة (يمكنك تحديثها يدوياً بسهولة)
    const nextMatch = {
        exists: true,
        opponent: "برشلونة",
        time: "15 يوليو 2026 - 10:00 مساءً",
        channel: "beIN Sports HD1",
        predictedLineup: "كورتوا، كارفاخال، ميليتاو، روديغر، ميندي، تشواميني، فالفيردي، بيلينجهام، فينيسيوس، مبابي، رودريغو",
        weaknesses: "التقدم المبالغ فيه للأظهرة الذي يترك مساحات خلفية.",
        prediction: "فوز الريال 2-1 بفضل روح العودة في الدقائق الأخيرة.",
        reason: "الذكاء الاصطناعي يرى أن شخصية ريال مدريد في الأوقات الحرجة تتفوق على أي تنظيم تكتيكي للخصم."
    };

    function loadMatch() {
        const div = document.getElementById('match-content');
        if (!nextMatch.exists) {
            div.innerHTML = "<h3>لا توجد مباراة قادمة حالياً.</h3>";
        } else {
            div.innerHTML = `
                <h3>المباراة القادمة: ريال مدريد vs ${nextMatch.opponent}</h3>
                <p><b>الموعد:</b> ${nextMatch.time}</p>
                <p><b>القنوات الناقلة:</b> ${nextMatch.channel}</p>
                <p><b>التشكيلة المتوقعة:</b> ${nextMatch.predictedLineup}</p>
                <div class="analysis">
                    <p><b>تحليل الذكاء الاصطناعي:</b> ${nextMatch.reason}</p>
                    <p><b>سلبيات الخصم:</b> ${nextMatch.weaknesses}</p>
                    <p><b>النتيجة المتوقعة:</b> ${nextMatch.prediction}</p>
                </div>
            `;
        }
    }

    function toggleNav() {
        let side = document.getElementById("mySidebar");
        side.style.width = side.style.width === "250px" ? "0" : "250px";
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        toggleNav();
    }

    loadMatch();
</script>
</body>
</html>
