<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حيوانات عشيرة | الموقع الرسمي</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; }
        header { background-color: #1a252f; color: white; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .cart-btn { cursor: pointer; font-size: 1.2rem; color: #f1c40f; font-weight: bold; }
        .nav { text-align: center; padding: 15px; background: #fff; border-bottom: 2px solid #ddd; }
        .nav button { background: #34495e; color: white; border: none; padding: 10px 15px; margin: 5px; border-radius: 5px; cursor: pointer; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #ddd; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        .price { color: #c0392b; font-weight: bold; font-size: 1.2rem; }
        #cart-section { background: #fff; padding: 20px; margin: 20px; border-radius: 10px; border: 2px dashed #1a252f; }
    </style>
</head>
<body>

<header>
    <h1>حيوانات عشيرة</h1>
    <div class="cart-btn" onclick="document.getElementById('cart-section').scrollIntoView()">🛒 سلة المشتريات</div>
</header>

<div class="nav">
    <button onclick="filter('all')">الكل</button>
    <button onclick="filter('bird')">الطيور</button>
    <button onclick="filter('predator')">المفترسات</button>
    <button onclick="filter('pet')">الأليفة</button>
    <button onclick="filter('special')">مميز (1 ريال)</button>
    <button onclick="sortItems()">فرز من الأرخص للأغلى</button>
</div>

<div class="container" id="grid"></div>
