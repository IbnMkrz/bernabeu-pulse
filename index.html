<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حلوين عشيرة</title>
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        #image-container { margin: 20px auto; width: 100%; max-width: 500px; }
        img { width: 100%; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background-color: #ff6b6b; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>

    <h1>حلوين عشيرة</h1>
    <p>اضغط علي الزر لرؤية اجمل ما خلق الله</p>
    
    <button onclick="changeImage()">اضغط هنا</button>

    <div id="image-container">
        <img id="random-img" src="" alt="صورة">
    </div>

    <script>
        // هنا قمت بوضع صورك كبيانات نصية مشفرة (Base64)
        const images = [
            "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA...", // ضع هنا كود Base64 للصورة الأولى
            "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA..."  // وهكذا لباقي الصور
        ];

        function changeImage() {
            const img = document.getElementById('random-img');
            const randomIdx = Math.floor(Math.random() * images.length);
            img.src = images[randomIdx];
        }
        
        // عرض صورة عند فتح الموقع لأول مرة
        changeImage();
    </script>
</body>
</html>
