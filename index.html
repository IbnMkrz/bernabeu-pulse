<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حيوانات عشيرة</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: white; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .price { color: red; font-weight: bold; }
        button { background: #27ae60; border: none; color: white; padding: 8px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<h1>حيوانات عشيرة</h1>

<div class="grid">
    <div class="card">
        <img src="https://i.ibb.co/fYgTNcys/bird1.jpg" alt="صورة">
        <p>السعر: 1 ريال</p>
        <button onclick="alert('تمت الإضافة')">إضافة</button>
    </div>
    
    <div class="card">
        <img src="https://i.ibb.co/jv22Cg2p/pred1.jpg" alt="صورة">
        <p>السعر: 350 ريال</p>
        <button onclick="alert('تمت الإضافة')">إضافة</button>
    </div>
</div>

</body>
</html>
