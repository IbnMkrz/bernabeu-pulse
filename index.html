<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حيوانات عشيرة | الموقع الرسمي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: #f4f4f4; color: #333; }
        header { background-color: #2c3e50; color: white; padding: 2rem; text-align: center; }
        .container { max-width: 1100px; margin: 2rem auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 0 20px; }
        .animal-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .animal-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; background-color: #ddd; }
        .animal-card h3 { margin: 10px 0; color: #2c3e50; }
        .status { font-weight: bold; color: #27ae60; }
        footer { text-align: center; padding: 2rem; color: #777; }
    </style>
</head>
<body>

<header>
    <h1>موقع حيوانات عشيرة الرسمي</h1>
    <p>الجودة، الأمانة، والتميز في عالم الحيوان</p>
</header>

<div class="container">
    <!-- يمكنك تكرار هذا القسم لكل حيوان -->
    <div class="animal-card">
        <img src="رابط_صورة_الحيوان_هنا.jpg" alt="صورة الحيوان">
        <h3>اسم الحيوان الأول</h3>
        <p>وصف مختصر ومميزات الحيوان هنا.</p>
        <p class="status">● الحالة: متوفر</p>
    </div>

    <div class="animal-card">
        <img src="رابط_صورة_الحيوان_هنا.jpg" alt="صورة الحيوان">
        <h3>اسم الحيوان الثاني</h3>
        <p>وصف مختصر ومميزات الحيوان هنا.</p>
        <p class="status">● الحالة: متوفر</p>
    </div>
</div>

<footer>
    <p>جميع الحقوق محفوظة لـ "حيوانات عشيرة" &copy; 2026</p>
</footer>

</body>
</html>
